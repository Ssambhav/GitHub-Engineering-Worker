# GitHub Engineering Worker global settings.
# This file is declarative only. Do not store secrets here.

project:
  name: GitHub Engineering Worker
  mode: autonomous-engineering-worker
  environment: ${GEW_ENV:-development}

openclaw:
  workspace: ${OPENCLAW_WORKSPACE:-.}
  runtime_dir: runtime
  state_dir: states
  memory_dir: memory
  audit_dir: audit

github:
  owner: ${GITHUB_OWNER}
  repository: ${GITHUB_REPOSITORY}
  token_env: GITHUB_TOKEN
  default_base_branch: main
  branch_prefix: gew/

execution:
  dry_run: false
  require_human_approval_for:
    - destructive_git_operations
    - production_deployments
    - dependency_major_upgrades
    - security_sensitive_changes
  max_parallel_issues: 1
  max_retry_attempts: 3

observability:
  log_level: info
  audit_decisions: true
  retain_runtime_artifacts: false

discord:
  enabled: ${DISCORD_ENABLED:-true}
  guild_id: ${DISCORD_GUILD_ID:-1523066948483682465}
  token_env: DISCORD_BOT_TOKEN
  auto_reconnect: true
  slash_commands_enabled: true
  channels:
    worker_status: ${DISCORD_CHANNEL_WORKER_STATUS}
    worker_activity: ${DISCORD_CHANNEL_WORKER_ACTIVITY}
    worker_success: ${DISCORD_CHANNEL_WORKER_SUCCESS}
    developer_escalations: ${DISCORD_CHANNEL_DEVELOPER_ESCALATIONS}
    engineering_reports: ${DISCORD_CHANNEL_ENGINEERING_REPORTS}
    worker_logs: ${DISCORD_CHANNEL_WORKER_LOGS}
    metrics: ${DISCORD_CHANNEL_METRICS}
    commands: ${DISCORD_CHANNEL_COMMANDS}

policies:
  security: policies/security/README.md
  repository: policies/repository/README.md
  review: policies/review/README.md
  runtime: policies/runtime/README.md
  retry: retry/RETRY_POLICY.md
  failure: retry/FAILURE_POLICY.md
